name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install vendored JAR
        run: mvn install:install-file \
             -Dfile=lib/ecommerce-common-events-0.0.1-SNAPSHOT.jar \
             -DgroupId=com.artichourey.ecommerce \
             -DartifactId=ecommerce-common-events \
             -Dversion=0.0.1-SNAPSHOT \
             -Dpackaging=jar

      - name: Build order-service
        run: mvn clean install
