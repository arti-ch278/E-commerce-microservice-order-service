name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Debug: confirm current directory and contents of lib/
      - name: Debug JAR path
        run: |
          echo "Current working directory:"
          pwd
          echo "Contents of lib folder:"
          ls -l lib
          if [ ! -f lib/ecommerce-common-events-0.0.1-SNAPSHOT.jar ]; then
            echo "ERROR: ecommerce-common-events-0.0.1-SNAPSHOT.jar not found in lib/"
            exit 1
          fi

      # Install the vendored JAR to local Maven repository
      - name: Install vendored JAR
        run: |
          echo "Installing JAR from $(pwd)/lib/ecommerce-common-events-0.0.1-SNAPSHOT.jar"
          mvn install:install-file \
            -Dfile="$(pwd)/lib/ecommerce-common-events-0.0.1-SNAPSHOT.jar" \
            -DgroupId=com.artichourey.ecommerce \
            -DartifactId=ecommerce-common-events \
            -Dversion=0.0.1-SNAPSHOT \
            -Dpackaging=jar

      # Build the order-service project
      - name: Build order-service
        run: mvn clean install
