name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Install all JARs in lib/ to local Maven repo
      - name: Install vendored JARs
        run: |
          for jar in lib/*.jar; do
            echo "Installing $jar..."
            mvn install:install-file \
              -Dfile="$jar" \
              -DgroupId=com.artichourey.ecommerce \
              -DartifactId=$(basename "$jar" .jar) \
              -Dversion=0.0.1-SNAPSHOT \
              -Dpackaging=jar
          done

      # 4. Build the project
      - name: Build order-service
        run: mvn clean install
