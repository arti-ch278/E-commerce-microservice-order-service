name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Verify the vendored JAR exists
      - name: Check vendored JAR
        run: |
          echo "Current working directory:"
          pwd
          echo "Listing lib folder:"
          ls -l lib
          # Fail if the JAR does not exist
          if [ ! -f lib/ecommerce-common-events-0.0.1-SNAPSHOT.jar ]; then
            echo "ERROR: ecommerce-common-events-0.0.1-SNAPSHOT.jar not found in lib/"
            exit 1
          fi

      # Install the vendored JAR to local Maven repo
      - name: Install vendored JAR
        run: mvn install:install-file \
             -Dfile=lib/ecommerce-common-events-0.0.1-SNAPSHOT.jar \
             -DgroupId=com.artichourey.ecommerce \
             -DartifactId=ecommerce-common-events \
             -Dversion=0.0.1-SNAPSHOT \
             -Dpackaging=jar

      # Build the order-service project
      - name: Build order-service
        run: mvn clean install
